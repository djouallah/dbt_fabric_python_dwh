aemo_electricity:
  target: dev
  outputs:
    dev:
      # dbt-fabric-samdebruyn: keeps type `fabric` for the Warehouse (T-SQL) target, but uses
      # Microsoft's pure-Python `mssql-python` driver — no ODBC driver / no `driver:` field.
      type: fabric
      # SQL connection string (analytics) endpoint of the Fabric Warehouse,
      # e.g. xxxxxxxx.datawarehouse.fabric.microsoft.com
      server: "{{ env_var('FABRIC_DWH_SERVER') }}"
      # Warehouse name (database) — the dbt models materialize here.
      database: "{{ env_var('FABRIC_DWH_NAME') }}"
      schema: "{{ env_var('DBT_SCHEMA', 'mart') }}"
      # Workspace context — required by the warehouse-snapshot macro (and Python models); the
      # adapter calls the Fabric REST API with it. Unused for plain SQL connections.
      workspace_id: "{{ env_var('FABRIC_WORKSPACE_ID', '') }}"
      # Auth method handed to the samdebruyn/mssql-python adapter:
      #   CLI                             -> uses the logged-in `az` identity (CI + laptop)
      #   ActiveDirectoryServicePrincipal -> tenant_id/client_id/client_secret below
      #   notebookutils                   -> adapter self-resolves the SQL token (Fabric notebook)
      #   (access_token below overrides all of the above when set)
      authentication: "{{ env_var('FABRIC_AUTH', 'CLI') }}"
      tenant_id: "{{ env_var('AZURE_TENANT_ID', '') }}"
      client_id: "{{ env_var('AZURE_CLIENT_ID', '') }}"
      client_secret: "{{ env_var('AZURE_CLIENT_SECRET', '') }}"
      # Direct token override (unused on the notebookutils/CLI paths; kept as a no-op default).
      access_token: "{{ env_var('FABRIC_ACCESS_TOKEN', '') }}"
      encrypt: true
      trust_cert: false
      threads: 4
      retries: 1
