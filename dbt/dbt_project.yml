name: 'aemo_electricity'
version: '1.0.0'

profile: 'aemo_electricity'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Fabric Warehouse has no implicit schemas — create the ones the models target before
# any model runs. (There is no DuckDB azure_transport SET here anymore; reads go through
# OPENROWSET with the warehouse identity.)
on-run-start:
  - "{{ create_schemas_if_not_exists(['landing', 'mart']) }}"

# After a model run, refresh a read-only point-in-time snapshot of the warehouse (samdebruyn
# feature, retained up to 30 days) so the Direct-Lake semantic model / Power BI can read a
# stable copy while dbt rebuilds. Gated to run/build so it doesn't re-fire on `dbt test`.
on-run-end:
  - "{{ create_or_update_fabric_warehouse_snapshot('aemo_snapshot', 'Latest point-in-time snapshot after dbt run') if flags.WHICH in ['run', 'build'] else '' }}"

vars:
  # Env vars used:
  # - DBT_SCHEMA: default schema (default: mart)
  # - FILES_PATH: abfss OneLake Files root where the downloader lands CSVs (built by the runner)

models:
  aemo_electricity:
    staging:
      +materialized: view
      +schema: landing
    dimensions:
      +materialized: table
    marts:
      +materialized: incremental
      +schema: landing
