defaults:
  # Lakehouse: provisioned if missing, kept if it already exists. It holds the raw CSVs
  # (Files/csv/**) and the archive log (Files/csv_archive_log.parquet) that the dbt-fabric
  # models read via OPENROWSET. The file-landing pipeline is unchanged and not part of this
  # project — it lands files here exactly as before.
  lakehouse_name:    "data"
  # Fabric Warehouse: provisioned if missing, kept if it exists. dbt models materialize
  # here (schemas: landing, mart). Distinct name so it never clashes with the duckdb solution.
  warehouse_name:    "aemo"
  download_limit:    "2"
  schedule_interval: "30"
  schedule_start:    "2025-01-01T00:00:00"
  schedule_end:      "2030-12-31T23:59:59"
  ci_download_limit: "90"

local:
  ws:            "d5f25039-7f33-4668-b909-2c397b2626fb"
  lakehouse:     "bf9ad9cb-295f-4df1-8cf0-519a8b2cfbda"
  dbt_path:      "/lakehouse/default/Files/dbt_fabric_python_notebook_dwh/dbt"

main:
  ws:                "d5f25039-7f33-4668-b909-2c397b2626fb"
  schedule_interval: "720"
  download_limit:    "5"

production:
  ws:             "d5f25039-7f33-4668-b909-2c397b2626fb"
  download_limit: "60"
